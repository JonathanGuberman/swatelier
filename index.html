<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyswatter STL Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
      white-space: nowrap;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .upload-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .upload-btn:hover { background: #c73e54; }
    #file-input { display: none; }
    #image-preview {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
      border: 2px solid #0f3460;
      display: none;
    }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #a0a0b0;
    }
    .slider-group input[type="range"] {
      width: 80px;
      accent-color: #e94560;
    }
    .slider-group .value {
      width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .slider-group input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid #444;
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    .slider-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .slider-group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
    .crop-action-btn {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      pointer-events: none;
    }
    .crop-action-btn.active {
      opacity: 1;
      pointer-events: auto;
      background: #1a5276;
    }
    .crop-action-btn.active:hover { background: #1f6f8b; }
    #download-btn {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      pointer-events: none;
    }
    #download-btn.active {
      opacity: 1;
      pointer-events: auto;
      background: #1a5276;
    }
    #download-btn.active:hover { background: #1f6f8b; }
    #status {
      font-size: 13px;
      color: #a0a0b0;
      min-width: 120px;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(233, 69, 96, 0.1);
      border: 3px dashed #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #e94560;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .drop-overlay.visible { opacity: 1; }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      gap: 12px;
    }
    .placeholder svg { opacity: 0.3; }
    .placeholder p { font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Flyswatter STL Generator</h1>
    <div class="controls">
      <label class="upload-btn" for="file-input">Upload Image</label>
      <input type="file" id="file-input" accept="image/*" />
      <img id="image-preview" />
      <div class="slider-group">
        <label for="density-slider">Density</label>
        <input type="range" id="density-slider" min="15" max="60" value="32" />
        <span class="value" id="density-value">32</span>
      </div>
      <div class="slider-group">
        <label for="thickness-slider">Thickness</label>
        <input type="range" id="thickness-slider" min="0.8" max="3.0" step="0.1" value="1.5" />
        <span class="value" id="thickness-value">1.5</span>
      </div>
      <div class="slider-group">
        <label for="invert-checkbox">Invert</label>
        <input type="checkbox" id="invert-checkbox" />
      </div>
      <div class="slider-group">
        <label for="mesh-color">Mesh</label>
        <input type="color" id="mesh-color" value="#2a2a2a" />
      </div>
      <div class="slider-group">
        <label for="bg-color">Background</label>
        <input type="color" id="bg-color" value="#1a1a2e" />
      </div>
      <button id="crop-btn" class="crop-action-btn">Crop</button>
      <button id="download-btn">Download STL</button>
      <span id="status">Upload an image to begin</span>
    </div>
  </header>
  <div id="canvas-container">
    <div class="placeholder" id="placeholder">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M12 2L12 8M12 8L9 5M12 8L15 5" />
        <rect x="3" y="10" width="18" height="11" rx="2" />
      </svg>
      <p>Upload an image or drag &amp; drop</p>
    </div>
    <div class="drop-overlay" id="drop-overlay">Drop image here</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
