<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swatelier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
      white-space: nowrap;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .upload-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .upload-btn:hover { background: #c73e54; }
    #file-input { display: none; }
    #image-preview {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
      border: 2px solid #0f3460;
      display: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #image-preview:hover { border-color: #e94560; }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #a0a0b0;
    }
    .slider-group input[type="range"] {
      width: 80px;
      accent-color: #e94560;
    }
    .slider-group .value {
      width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .slider-group input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid #444;
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    .slider-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .slider-group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
    .dimensions-toggle {
      background: #0f3460;
      color: #a0a0b0;
      border: 1px solid #1a5276;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .dimensions-toggle:hover { background: #1a5276; color: #e0e0e0; }
    .dimensions-panel {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px 16px;
      z-index: 100;
      min-width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .dimensions-panel.open { display: flex; flex-direction: column; gap: 8px; }
    .dimensions-panel .slider-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #a0a0b0;
    }
    .dimensions-panel .slider-group label { min-width: 90px; }
    .dimensions-panel .slider-group input[type="range"] { width: 80px; accent-color: #e94560; }
    .dimensions-panel .slider-group .value { width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
    .dim-anchor { position: relative; }
    #download-btn {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      pointer-events: none;
    }
    #download-btn.active {
      opacity: 1;
      pointer-events: auto;
      background: #1a5276;
    }
    #download-btn.active:hover { background: #1f6f8b; }
    #status {
      font-size: 13px;
      color: #a0a0b0;
      min-width: 120px;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(233, 69, 96, 0.1);
      border: 3px dashed #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #e94560;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .drop-overlay.visible { opacity: 1; }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      gap: 12px;
    }
    .placeholder svg { opacity: 0.3; }
    .placeholder p { font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Swatelier</h1>
    <div class="controls">
      <label class="upload-btn" for="file-input">Upload Image</label>
      <input type="file" id="file-input" accept="image/*" />
      <img id="image-preview" />
      <div class="slider-group">
        <label for="density-slider">Density</label>
        <input type="range" id="density-slider" min="15" max="60" value="32" />
        <span class="value" id="density-value">32</span>
      </div>
      <div class="slider-group">
        <label for="invert-checkbox">Invert</label>
        <input type="checkbox" id="invert-checkbox" />
      </div>
      <div class="dim-anchor">
        <button class="dimensions-toggle" id="dim-toggle">Dimensions ▾</button>
        <div class="dimensions-panel" id="dim-panel">
          <div class="slider-group">
            <label for="thickness-slider">Thickness</label>
            <input type="range" id="thickness-slider" min="0.8" max="3.0" step="0.1" value="1.5" />
            <span class="value" id="thickness-value">1.5</span><span>mm</span>
          </div>
          <div class="slider-group">
            <label for="head-width-slider">Head Width</label>
            <input type="range" id="head-width-slider" min="60" max="140" step="1" value="95" />
            <span class="value" id="head-width-value">95</span><span>mm</span>
          </div>
          <div class="slider-group">
            <label for="head-height-slider">Head Height</label>
            <input type="range" id="head-height-slider" min="80" max="180" step="1" value="119" />
            <span class="value" id="head-height-value">119</span><span>mm</span>
          </div>
          <div class="slider-group">
            <label for="handle-length-slider">Handle Length</label>
            <input type="range" id="handle-length-slider" min="100" max="500" step="5" value="300" />
            <span class="value" id="handle-length-value">300</span><span>mm</span>
          </div>
          <div class="slider-group">
            <label for="handle-diam-slider">Handle Diameter</label>
            <input type="range" id="handle-diam-slider" min="3" max="10" step="0.5" value="6" />
            <span class="value" id="handle-diam-value">6</span><span>mm</span>
          </div>
          <div class="slider-group">
            <label for="leg-length-slider">Leg Length</label>
            <input type="range" id="leg-length-slider" min="10" max="40" step="1" value="30" />
            <span class="value" id="leg-length-value">30</span><span>mm</span>
          </div>
        </div>
      </div>
      <div class="slider-group">
        <label for="mesh-color">Mesh</label>
        <input type="color" id="mesh-color" value="#2a2a2a" />
      </div>
      <div class="slider-group">
        <label for="bg-color">Background</label>
        <input type="color" id="bg-color" value="#d4d4d8" />
      </div>
      <button id="download-btn">Download STL</button>
      <span id="status">Upload an image to begin</span>
    </div>
  </header>
  <div id="canvas-container">
    <div class="placeholder" id="placeholder">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M12 2L12 8M12 8L9 5M12 8L15 5" />
        <rect x="3" y="10" width="18" height="11" rx="2" />
      </svg>
      <p>Upload an image or drag &amp; drop</p>
    </div>
    <div class="drop-overlay" id="drop-overlay">Drop image here</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
